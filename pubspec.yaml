name: nigergram
description: "NigerGram - High-Fidelity Nigerian Short Video Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Backend Infrastructure (Firestore & Supabase Systems)
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  supabase_flutter: ^2.5.0

  # Advanced Video Processing & Hardware Playback Pipelines
  video_player: ^2.8.2
  video_compress: ^3.1.2
  image_picker: ^1.1.0

  # Network Optimization & Custom Iconography Engines
  preload_page_view: ^0.2.0
  lucide_icons_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
