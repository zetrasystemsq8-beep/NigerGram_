name: Build NigerGram APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete old artifacts
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const response = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const artifact of response.data.artifacts) {
              if (artifact.name === "NigerGram-debug") {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Fix package names
        run: |
          find lib -name "*.dart" -exec sed -i 's/package:flutter_video_feed/package:nigergram/g' {} +

      - name: Fix package folder
        run: |
          mkdir -p android/app/src/main/kotlin/com/nigergram/app
          if [ -f android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt ]; then
            cp android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt android/app/src/main/kotlin/com/nigergram/app/MainActivity.kt
          fi

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NigerGram-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          overwrite: true
          retention-days: 1
