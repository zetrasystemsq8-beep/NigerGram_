name: Build NigerGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'

      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Fix package name in all dart files
        run: |
          find lib -name "*.dart" -exec sed -i 's/package:flutter_video_feed/package:nigergram/g' {} +

      - name: Force fix interaction buttons file
        run: |
          cat > lib/features/video_feed/presentation/view/widgets/video_feed_view_interaction_buttons.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:nigergram/core/design_system/colors.dart';
          import 'package:nigergram/core/utils/extensions/context_size_extensions.dart';
          import 'package:nigergram/features/video_feed/presentation/view/widgets/video_feed_view_interaction_button.dart';
          import 'package:lucide_icons_flutter/lucide_icons.dart';

          class VideoFeedViewInteractionButtons extends StatelessWidget {
            const VideoFeedViewInteractionButtons({
              required this.isLiked,
              required this.isBookmarked,
              required this.likeCount,
              required this.commentCount,
              required this.shareCount,
              required this.onLikeTapped,
              this.onCommentTapped,
              this.onShareTapped,
              this.onBookmarkTapped,
              super.key,
            });

            final bool isLiked;
            final bool isBookmarked;
            final int likeCount;
            final int commentCount;
            final int shareCount;
            final VoidCallback onLikeTapped;
            final VoidCallback? onCommentTapped;
            final VoidCallback? onShareTapped;
            final VoidCallback? onBookmarkTapped;

            @override
            Widget build(BuildContext context) {
              return Padding(
                padding: EdgeInsets.only(bottom: context.h(4)),
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.end,
                  spacing: context.h(20),
                  children: [
                    VideoFeedViewInteractionButton(
                      icon: isLiked ? Icons.favorite_rounded : Icons.favorite_border,
                      count: likeCount,
                      iconColor: isLiked ? const Color(0xFFFE2C55) : white,
                      onTap: onLikeTapped,
                    ),
                    VideoFeedViewInteractionButton(
                      icon: LucideIcons.messageCircle,
                      count: commentCount,
                      onTap: onCommentTapped ?? () {},
                    ),
                    VideoFeedViewInteractionButton(
                      icon: LucideIcons.send,
                      count: shareCount,
                      onTap: onShareTapped ?? () {},
                    ),
                    GestureDetector(
                      onTap: onBookmarkTapped,
                      child: Icon(
                        isBookmarked ? Icons.bookmark : Icons.bookmark_border,
                        color: white,
                        size: context.sq(36),
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Fix package folder structure
        run: |
          mkdir -p android/app/src/main/kotlin/com/nigergram/app
          cp android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt android/app/src/main/kotlin/com/nigergram/app/MainActivity.kt
          rm android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt

      - name: Fix app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NigerGram-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
