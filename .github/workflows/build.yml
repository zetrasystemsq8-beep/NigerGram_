name: NigerGram Institutional Production Engine

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy_android:
    name: Industrial Android Compilation Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      - name: Initialize Java Development Kit (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # We are pinning this to an exact compatible version to satisfy your SDK constraints
      - name: Set Up Flutter SDK Core
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Adjust this to the version you used locally
          channel: 'stable'
          cache: true

      - name: Fetch Local Pub Packages
        run: flutter pub get

      - name: Purge Legacy Project Caches
        run: flutter clean

      - name: Compile Universal Safe Fallback Production APK
        run: flutter build apk --release

      - name: Package and Export Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nigergram-production-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
