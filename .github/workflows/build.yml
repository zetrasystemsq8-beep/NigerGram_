name: Build NigerGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'

      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Fix package name in all dart files
        run: |
          find lib -name "*.dart" -exec sed -i 's/package:flutter_video_feed/package:nigergram/g' {} +

      - name: Fix duplicate class in interaction button file
        run: |
          cat > lib/features/video_feed/presentation/view/widgets/video_feed_view_interaction_button.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:nigergram/core/design_system/colors.dart';
          import 'package:nigergram/core/utils/extensions/context_size_extensions.dart';

          class VideoFeedViewInteractionButton extends StatefulWidget {
            const VideoFeedViewInteractionButton({
              required this.icon,
              required this.count,
              required this.onTap,
              this.iconColor = white,
              super.key,
            });

            final IconData icon;
            final int count;
            final Color iconColor;
            final VoidCallback onTap;

            @override
            State<VideoFeedViewInteractionButton> createState() =>
                _VideoFeedViewInteractionButtonState();
          }

          class _VideoFeedViewInteractionButtonState
              extends State<VideoFeedViewInteractionButton>
              with SingleTickerProviderStateMixin {
            late final AnimationController _scaleAnimationController;
            late final Animation<double> _scaleAnimation;

            @override
            void initState() {
              super.initState();
              _scaleAnimationController = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 200),
              );
              _scaleAnimation = TweenSequence<double>([
                TweenSequenceItem(
                    tween: Tween<double>(begin: 1.0, end: 1.3)
                        .chain(CurveTween(curve: Curves.easeOut)),
                    weight: 50),
                TweenSequenceItem(
                    tween: Tween<double>(begin: 1.3, end: 1.0)
                        .chain(CurveTween(curve: Curves.elasticIn)),
                    weight: 50),
              ]).animate(_scaleAnimationController);
            }

            @override
            void dispose() {
              _scaleAnimationController.dispose();
              super.dispose();
            }

            String _formatCount(int count) {
              if (count >= 1000000) return '${(count / 1000000).toStringAsFixed(1)}M';
              if (count >= 1000) return '${(count / 1000).toStringAsFixed(1)}K';
              return count.toString();
            }

            void _onTap() {
              HapticFeedback.lightImpact();
              _scaleAnimationController.forward(from: 0.0);
              widget.onTap();
            }

            @override
            Widget build(BuildContext context) {
              return GestureDetector(
                onTap: _onTap,
                behavior: HitTestBehavior.opaque,
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    ScaleTransition(
                      scale: _scaleAnimation,
                      child: Icon(
                        widget.icon,
                        color: widget.iconColor,
                        size: context.sq(38),
                        shadows: const [
                          Shadow(
                            color: Colors.black38,
                            blurRadius: 6,
                            offset: Offset(0, 2),
                          ),
                        ],
                      ),
                    ),
                    SizedBox(height: context.h(3)),
                    Text(
                      _formatCount(widget.count),
                      style: TextStyle(
                        color: white,
                        fontSize: context.fontSize(12.5),
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                  ],
                ),
              );
            }
          }
          DARTEOF

      - name: Fix package folder structure
        run: |
          mkdir -p android/app/src/main/kotlin/com/nigergram/app
          cp android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt android/app/src/main/kotlin/com/nigergram/app/MainActivity.kt
          rm android/app/src/main/kotlin/com/example/flutter_video_feed/MainActivity.kt

      - name: Fix app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android/app/src/main/res/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NigerGram-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
