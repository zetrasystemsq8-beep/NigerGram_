name: NigerGram Institutional Production Engine

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy_android:
    name: Industrial Android Compilation Pipeline
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the latest clean code from your main branch
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      # 2. Setup high-performance JDK for the Gradle build system
      - name: Initialize Java Development Kit (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup the Flutter SDK with high-speed caching enabled
      - name: Set Up Flutter SDK Core
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Fetch your project dependencies
      - name: Fetch Local Pub Packages
        run: flutter pub get

      # 5. Execute clean build to purge any ghost errors from the runner
      - name: Purge Legacy Project Caches
        run: flutter clean

      # 6. Build the safe, universal production-signed APK
      - name: Compile Universal Safe Fallback Production APK
        run: flutter build apk --release

      # 7. Upload the completed APK so you can download it directly from GitHub
      - name: Package and Export Production Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nigergram-production-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
